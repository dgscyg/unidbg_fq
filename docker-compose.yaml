version: "3.8"

services:
  unidbg:
    build:
      context: .
      dockerfile: Dockerfile
    image: fqxs:v1
    container_name: unidbg-server
    restart: unless-stopped
    ports:
      - "7860:7860"      # Web 控制台
      - "9999:9999"      # API 服务（可选，按需暴露）
    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - UNIDBG_APP_DIR=/app/unidbg
      - UNIDBG_LOG_FILE=/app/unidbg_onekey.log
      - UNIDBG_SCRIPT_PATH=/app/unidbg_onekey.sh
      - UNIDBG_API_TARGET=http://127.0.0.1:9999
      # 如果项目需要数据库连接（pom.xml 中有 postgresql 依赖），取消注释：
      # - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/unidbg
      # - SPRING_DATASOURCE_USERNAME=unidbg
      # - SPRING_DATASOURCE_PASSWORD=unidbg123
    volumes:
      - unidbg-data:/app/unidbg/data          # 持久化数据
      - unidbg-logs:/app/logs                  # 持久化日志
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # networks:
    #   - unidbg-net

  # ──────────────────────────────────────
  # 如果项目需要 PostgreSQL 数据库，取消注释以下内容
  # （pom.xml 中包含 spring-boot-starter-jdbc + postgresql 依赖）
  # ──────────────────────────────────────
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: unidbg-postgres
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_DB=unidbg
  #     - POSTGRES_USER=unidbg
  #     - POSTGRES_PASSWORD=unidbg123
  #     - TZ=Asia/Shanghai
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U unidbg"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - unidbg-net

volumes:
  unidbg-data:
    name: unidbg-data
  unidbg-logs:
    name: unidbg-logs
