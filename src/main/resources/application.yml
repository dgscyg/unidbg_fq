server:
  port: ${SERVER_PORT:9999}
  address: ${SERVER_ADDRESS:0.0.0.0}

spring:
  main:
    banner-mode: "off"
  application:
    name: unidbg-boot-server
  mvc:
    throw-exception-if-no-handler-found: true
  webmvc:
    async:
      request-timeout: 300s
  threads:
    virtual:
      enabled: true

application:
  unidbg:
    reset-cooldown-ms: 2000
    upstream-empty-reset-cooldown-ms: 8000

fq:
  cache:
    postgres:
      # 配置 DB_URL（postgresql://user:pass@host:port/db）后自动启用 PostgreSQL 主缓存
      url: ${DB_URL:}
  download:
    request-interval-ms: 500
    retry:
      max-retries: 3
      delay-ms: 2000
      max-delay-ms: 10000
    upstream:
      connect-timeout-ms: 15000
      read-timeout-ms: 30000
    prefetch:
      chapter-size: 30
      executor-core-size: 2
      executor-max-size: 2
      executor-queue-capacity: 256
      executor-keep-alive-seconds: 60
    cache:
      chapter-max-entries: 2000
      chapter-ttl-ms: 600000
      chapter-negative-ttl-ms: 600000
      chapter-failure-log-cooldown-ms: 180000
      chapter-empty-retry-backoff-ms: 30000
      chapter-include-raw-content: false
      search-max-entries: 256
      search-ttl-ms: 45000
      api-directory-max-entries: 512
      api-directory-ttl-ms: 600000
    auto-restart:
      enabled: true
      error-threshold: 5
      upstream-empty-error-threshold: 8
      window-ms: 300000
      min-interval-ms: 120000
      self-heal-enabled: true
      self-heal-cooldown-ms: 180000
  api:
    base-url: ${FQ_API_BASE_URL:https://api5-normal-sinfonlineb.fqnovel.com}
    device-pool-size: ${DEVICE_POOL_SIZE:8}
    device-pool-shuffle-on-startup: ${DEVICE_POOL_SHUFFLE_ON_STARTUP:true}
    device-pool-probe-on-startup: ${DEVICE_POOL_PROBE_ON_STARTUP:true}
    device-pool-probe-max-attempts: ${DEVICE_POOL_PROBE_MAX_ATTEMPTS:3}
    device-rotate-cooldown-ms: ${DEVICE_ROTATE_COOLDOWN_MS:60000}
    device-pool-allow-empty: ${DEVICE_POOL_ALLOW_EMPTY:true}
    device-pool-risk-cooldown-ms: ${DEVICE_POOL_RISK_COOLDOWN_MS:43200000}
